extension:
  name: Audio Mixer
  description: Applies presets like Nightcore or (slowed + reverb) to music on most websites such as Spotify, SoundCloud, YouTube.
ui:
  labels:
    pitch: Pitch
    semitoneShift: 'Semitone Shift:'
    activeAmount: 'Active amount:'
    reverb: Reverb
    decay: 'Decay:'
    mediaSettings: Media Settings
    volume: 'Volume:'
    playbackRate: 'Playback Rate:'
    presets: Presets
    custom: Custom
    newPresetName: New Preset Name
  buttons:
    mute: Mute
    unmute: Unmute
    reset: Reset
    settings: Settings
    playPause: Play/Pause
    quit: Quit
    save: Save
    cancel: Cancel
    savePreset: Save preset
    deletePreset: Delete preset
  presets:
    default: Default/Reset
    classicNightcore: Classic Nightcore
    slowedReverb: (slowed + reverb)
    roomyReverb: Roomy Reverb
status:
  waiting: Waiting for media.
  playing: Playing.
  togglePlayback: Played/paused.
  alreadyPlaying: Already playing.
  failedCommand: Failed, check devtools.
  presetsEmpty: Couldn't get presets, reset to default.
  exit: Exiting now.
  quit: Quit connection.
  noAudioContent: |-
    No audio detected on current tab.
    You must play audio before opening the extension.
  recordFailed: 'unable to create and record from tab, check devtools.'
errors:
  content:
    executed: 'Audio Mixer CONTENT: executed.'
    executeFailed: 'Failed to execute content script, contentTabId at the time: $1 error: $2'
    noMedia: 'no media found.'
    noMediaPlaying: 'no playing media found.'
    noActiveTab: 'no active tab found.'
    notValidTab: 'tab is not valid.'
    multipleMedia: 'multiple media elements playing, unable to pick one.'
    unableSetAttribute: 'unable to set attribute'
  capture:
    error: 'record tab isn''t playing audio but content tab is.'
    tabError: 'Unable to capture tab.'
  query:
    multiple: 'expected one element but got many, check query'
    none: 'expected one element but got none, check query'
  tabs:
    create: 'unable to create record tab.'
    get: 'tab does not exist.'
    removeContent: 'unable to remove content tab.'
    removeRecord: 'unable to remove record offscreen document.'
  commands:
    setValue: 'unable to set value'
    failed: 'unable to send command'
messages:
  exiting: Exiting, closed tabs, cleared storage and reset playback rate.
  github:
    issue: Please open an issue on GitHub with any details you have.
    website: If this website is already supported please open an issue on GitHub, if it isn't supported yet feel free to message me or open an issue on GitHub.
